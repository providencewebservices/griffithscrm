services:
  postgres:
    image: postgres:16
    container_name: griffiths-crm-db
    environment:
      POSTGRES_USER: griffiths_crm_app
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: griffiths_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit
    container_name: griffiths-crm-mail
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  localstack:
    image: localstack/localstack:latest
    container_name: griffiths-crm-localstack
    ports:
      - "4566:4566"  # LocalStack gateway
    environment:
      - SERVICES=s3
      - DEBUG=0
      - PERSISTENCE=1
    volumes:
      - localstack_data:/var/lib/localstack
      - ./localstack-init:/etc/localstack/init/ready.d

volumes:
  postgres_data:
  localstack_data:
